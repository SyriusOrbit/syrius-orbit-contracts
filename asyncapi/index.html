<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AsyncAPI</title>
    <link rel="stylesheet" href="https://unpkg.com/@asyncapi/react-component@1.4.2/styles/default.min.css" />
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@asyncapi/react-component@1.4.2/browser/standalone/index.js"></script>
    <style>html,body,#root{height:100%;margin:0}</style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (async () => {
        try {
          const schema = {
            url: new URL('./vda5050.yaml', window.location.href).href,
            options: { method: 'GET', mode: 'cors' },
          };

          if (!window.AsyncApiStandalone || typeof window.AsyncApiStandalone.render !== 'function') {
            throw new Error('AsyncApiStandalone.render not found');
          }

          window.AsyncApiStandalone.render(
            {
              schema,
              config: {
                show: {
                  errors: true,
                },
              },
            },
            document.getElementById('root'),
          );
        } catch (e) {
          document.body.innerHTML = '<pre style="color:red">' + e.message + '</pre>';
          console.error(e);
        }
      })();
    </script>
  </body>
</html>
