openapi: 3.0.3
info:
  title: OGC API - Processes
  version: 1.0.0
  description: OGC API Processes for task scheduling and execution in SyriusOrbit
paths:
  /processes:
    get:
      summary: Get available processes
      operationId: getProcesses
      responses:
        '200':
          description: List of available processes
  /jobs:
    post:
      summary: Execute a process (create job)
      operationId: executeProcess
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Job created
