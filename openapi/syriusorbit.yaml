openapi: 3.0.3
info:
  title: SyriusOrbit Spatial API
  version: 1.0.0
  description: |-
    Contract-first OpenAPI profile for SyriusOrbit spatial services.
    The API supports multi-site discovery, site-scoped collections,
    feature queries with CQL2, map retrieval, point cloud retrieval,
    route planning, and TSP solving.
  contact:
    name: SyriusOrbit Maintainers
    url: https://github.com/SyriusOrbit/syrius-orbit-contracts
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: /
security: []
tags:
  - name: Server
    description: API discovery and conformance endpoints.
  - name: Sites
    description: Site discovery and metadata.
  - name: Collections
    description: Site collections and collection metadata.
  - name: Features
    description: Feature query endpoints for cell and connection collections.
  - name: Maps
    description: Grid map retrieval endpoints.
  - name: Coverages
    description: Point cloud coverage endpoints.
  - name: Routes
    description: Route planning endpoints.
  - name: TSP
    description: Traveling salesman solving endpoints.
paths:
  /:
    $ref: './modules/common.paths.yaml#/paths/~1'
  /api:
    $ref: './modules/common.paths.yaml#/paths/~1api'
  /conformance:
    $ref: './modules/common.paths.yaml#/paths/~1conformance'
  /sites:
    $ref: './modules/common.paths.yaml#/paths/~1sites'
  /sites/{siteId}:
    $ref: './modules/sites.paths.yaml#/paths/~1sites~1{siteId}'
  /sites/{siteId}/collections:
    $ref: './modules/collections.paths.yaml#/paths/~1sites~1{siteId}~1collections'
  /sites/{siteId}/collections/{collectionId}:
    $ref: './modules/collections.paths.yaml#/paths/~1sites~1{siteId}~1collections~1{collectionId}'
  /sites/{siteId}/collections/{collectionId}/items:
    $ref: './modules/features.paths.yaml#/paths/~1sites~1{siteId}~1collections~1{collectionId}~1items'
  /sites/{siteId}/collections/{collectionId}/items/{featureId}:
    $ref: './modules/features.paths.yaml#/paths/~1sites~1{siteId}~1collections~1{collectionId}~1items~1{featureId}'
  /sites/{siteId}/collections/gridmap/map:
    $ref: './modules/maps.paths.yaml#/paths/~1sites~1{siteId}~1collections~1gridmap~1map'
  /sites/{siteId}/collections/gridmap/map/origin:
    $ref: './modules/maps.paths.yaml#/paths/~1sites~1{siteId}~1collections~1gridmap~1map~1origin'
  /sites/{siteId}/collections/gridmap/map/mask:
    $ref: './modules/maps.paths.yaml#/paths/~1sites~1{siteId}~1collections~1gridmap~1map~1mask'
  /sites/{siteId}/collections/gridmap/map/merged:
    $ref: './modules/maps.paths.yaml#/paths/~1sites~1{siteId}~1collections~1gridmap~1map~1merged'
  /sites/{siteId}/collections/pointcloud/coverage:
    $ref: './modules/coverages.paths.yaml#/paths/~1sites~1{siteId}~1collections~1pointcloud~1coverage'
  /sites/{siteId}/routes:
    $ref: './modules/routes.paths.yaml#/paths/~1sites~1{siteId}~1routes'
  /sites/{siteId}/routes/{routeId}:
    $ref: './modules/routes.paths.yaml#/paths/~1sites~1{siteId}~1routes~1{routeId}'
  /sites/{siteId}/tsp:
    $ref: './modules/tsp.paths.yaml#/paths/~1sites~1{siteId}~1tsp'
