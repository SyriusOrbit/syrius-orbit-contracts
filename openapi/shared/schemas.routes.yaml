openapi: 3.0.3
info:
  title: SyriusOrbit Route Schemas
  version: 1.0.0
paths: {}
components:
  schemas:
    cql2Expression:
      oneOf:
        - type: string
        - type: object
          additionalProperties: true

    statusEnum:
      type: string
      enum:
        - accepted
        - running
        - successful
        - failed

    routeDefinition:
      type: object
      properties:
        name:
          type: string
          description: Optional route name used in route listings.
        pois:
          type: object
          required:
            - source_filter
            - target_filter
          properties:
            source_filter:
              $ref: '#/components/schemas/cql2Expression'
            target_filter:
              $ref: '#/components/schemas/cql2Expression'
            multi_targets_strategy:
              type: string
              enum:
                - closest
                - fastest
                - uniform_random
              default: closest
        waypoints:
          type: object
          required:
            - type
            - coordinates
          properties:
            type:
              type: string
              enum:
                - MultiPoint
            coordinates:
              type: array
              minItems: 2
              items:
                type: array
                minItems: 2
                items:
                  type: number
        preference:
          type: string
          enum:
            - fastest
            - shortest
          default: fastest

    routes:
      type: object
      properties:
        links:
          type: array
          items:
            $ref: './schemas.common.yaml#/components/schemas/link'

    route-start-or-end:
      type: object
      required:
        - type
        - properties
        - geometry
      properties:
        type:
          type: string
          enum:
            - Feature
        id:
          oneOf:
            - type: string
            - type: integer
        properties:
          type: object
          required:
            - type
          properties:
            type:
              type: string
              enum:
                - start
                - end
        geometry:
          type: object
          required:
            - type
            - coordinates
          properties:
            type:
              type: string
              enum:
                - Point
            coordinates:
              type: array
              minItems: 2
              items:
                type: number

    route-overview:
      type: object
      required:
        - type
        - properties
        - geometry
      properties:
        type:
          type: string
          enum:
            - Feature
        id:
          oneOf:
            - type: string
            - type: integer
        properties:
          type: object
          required:
            - type
          properties:
            type:
              type: string
              enum:
                - route overview
            length_m:
              type: number
            duration_s:
              type: number
        geometry:
          type: object
          nullable: true
          required:
            - type
            - coordinates
          properties:
            type:
              type: string
              enum:
                - LineString
            coordinates:
              type: array
              minItems: 2
              items:
                type: array
                minItems: 2
                items:
                  type: number

    route-segment:
      type: object
      required:
        - type
        - properties
        - geometry
      properties:
        type:
          type: string
          enum:
            - Feature
        id:
          oneOf:
            - type: string
            - type: integer
        properties:
          type: object
          required:
            - type
          properties:
            type:
              type: string
              enum:
                - segment
            length_m:
              type: number
            duration_s:
              type: number
        geometry:
          type: object
          required:
            - type
            - coordinates
          properties:
            type:
              type: string
              enum:
                - Point
            coordinates:
              type: array
              minItems: 2
              items:
                type: number

    route:
      type: object
      required:
        - type
        - status
        - features
      properties:
        type:
          type: string
          enum:
            - FeatureCollection
        status:
          $ref: '#/components/schemas/statusEnum'
        name:
          type: string
        links:
          type: array
          items:
            $ref: './schemas.common.yaml#/components/schemas/link'
        features:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/route-overview'
              - $ref: '#/components/schemas/route-start-or-end'
              - $ref: '#/components/schemas/route-segment'
        bbox:
          type: array
          minItems: 4
          items:
            type: number

    routeRequest:
      $ref: '#/components/schemas/routeDefinition'

    routeComputationResult:
      $ref: '#/components/schemas/route'

    routeList:
      $ref: '#/components/schemas/routes'
