openapi: 3.0.3
info:
  title: SyriusOrbit TSP Schemas
  version: 1.0.0
paths: {}
components:
  schemas:
    tspRequest:
      type: object
      required:
        - cell_ids
      properties:
        cell_ids:
          type: array
          items:
            type: string
        start:
          type: string
        end:
          type: string
    tspResult:
      type: object
      required:
        - cell_id_sequence
        - cost
      properties:
        cell_id_sequence:
          type: array
          items:
            type: string
        start:
          type: string
        end:
          type: string
        cost:
          type: number
          format: double
        lowerBound:
          type: number
          format: double
        lower_bound:
          type: number
          format: double
        gap:
          type: number
          format: double
