openapi: 3.0.3
info:
  title: SyriusOrbit Site Paths
  version: 1.0.0
paths:
  /sites/{siteId}:
    get:
      tags:
        - Sites
      summary: Get a site
      operationId: getSite
      parameters:
        - $ref: '../shared/parameters.yaml#/components/parameters/siteId'
        - $ref: '../shared/parameters.yaml#/components/parameters/f-metadata'
      responses:
        '200':
          $ref: '../shared/responses.yaml#/components/responses/SiteDetail'
        '400':
          $ref: '../shared/responses.yaml#/components/responses/BadRequest'
        '403':
          $ref: '../shared/responses.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../shared/responses.yaml#/components/responses/NotFound'
        '500':
          $ref: '../shared/responses.yaml#/components/responses/InternalServerError'
