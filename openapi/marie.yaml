openapi: 3.0.3
info:
  title: Marie Service API
  version: 1.2.0
  description: |-
    GIS for indoor navigation
  contact:
    name: 虞坤霖 (Kunlin Yu)
    email: yukunlin@syriusrobotics.com
    url: 'https://www.flexgalaxy.ai/'
tags:
  - name: DataSet
  - name: Capabilities
    description: essential characteristics of this API
  - name: Features
    description: access to features
  - name: Maps
    description: return map data
  - name: Option Routes
    description: Routes as first class resources
  - name: TSP
    description: traveling salesman problem
  - name: MovingFeatureCollection
    description: Collections of moving features to be logically managed by a user.
  - name: MovingFeatures
    description: Moving feature data, including the temporal geometry, temporal properties, etc.
  - name: TemporalGeometry
    description: The spatial change over time (temporal geometry), representing the movement of the rigid or nonrigid body of a feature.
  - name: TemporalGeometryQuery
    description: Queryable resources for the temporal primitive geometry.
  - name: TemporalProperty
    description: The thematic change over time (temporal property), representing the variation of the value of any descriptive characteristic of a feature.
paths:
  '/vectors':
    get:
      summary: get a list of vector
      operationId: getVectors
      tags:
        - DataSet
      responses:
        '200':
          $ref: '#/components/responses/Vectors'
        '500':
          $ref: '#/components/responses/ServerError'
  '/vectors/{vectorId}':
    get:
      summary: describeVector
      tags:
        - DataSet
      parameters:
        - $ref: '#/components/parameters/vectorId'
      responses:
        '200':
          $ref: '#/components/responses/Vector'
        '500':
          $ref: '#/components/responses/ServerError'
  '/vectors/{vectorId}/':
    get:
      tags:
        - Capabilities
      summary: landing page
      description: |-
        The landing page provides links to the API definition, the conformance
        statements and to the feature collections in this dataset.
      operationId: getLandingPage
      parameters:
        - $ref: '#/components/parameters/vectorId'
      responses:
        '200':
          $ref: '#/components/responses/LandingPage'
        '500':
          $ref: '#/components/responses/ServerError'
  '/vectors/{vectorId}/conformance':
    get:
      tags:
        - Capabilities
      summary: information about specifications that this API conforms to
      description: |-
        A list of all conformance classes specified in a standard that the
        server conforms to.
      operationId: getConformanceDeclaration
      parameters:
        - $ref: '#/components/parameters/vectorId'
      responses:
        '200':
          $ref: '#/components/responses/ConformanceDeclaration'
        '500':
          $ref: '#/components/responses/ServerError'
  '/vectors/{vectorId}/collections':
    get:
      tags:
        - Capabilities
      summary: the feature collections in the dataset
      operationId: getCollections
      parameters:
        - $ref: '#/components/parameters/vectorId'
      responses:
        '200':
          $ref: '#/components/responses/Collections'
        '500':
          $ref: '#/components/responses/ServerError'
  '/vectors/{vectorId}/collections/{collectionId}':
    get:
      tags:
        - Capabilities
      summary: |-
        describe the feature collection with id `collectionId`
      operationId: describeCollection
      parameters:
        - $ref: '#/components/parameters/vectorId'
        - $ref: '#/components/parameters/collectionId'
      responses:
        '200':
          $ref: '#/components/responses/Collection'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      operationId: deleteCollection
      summary: Delete the collection
      description: |
        The collection catalog with id `collectionId` and including metadata and moving features SHOULD be deleted.
      tags:
        - MovingFeatureCollection
      parameters:
        - $ref: '#/components/parameters/vectorId'
        - $ref: '#/components/parameters/collectionId'
      responses:
        '204':
          description: Successfully deleted.
        '404':
          description: A collection with the specified name was not found.
        '405':
          description: Method not allow to built-in collections
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      operationId: replaceMetadata
      summary: Replace metadata about the collection
      description: |
        A user SHOULD replace metadata with id `collectionId`.
        The request body schema is the same the POST's one.
        However, `updateFrequency` property is NOT updated.
      tags:
        - MovingFeatureCollection
      parameters:
        - $ref: '#/components/parameters/vectorId'
        - $ref: '#/components/parameters/collectionId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/collection-body'
            example:
              title: moving_feature_collection_sample
              # updateFrequency: 1000
              samplingInterval: 1000
              description: example
              itemType: movingfeature
      responses:
        '204':
          description: Successfully replaced.
        '404':
          description: A collection with the specified name was not found.
        '405':
          description: Method not allow to built-in collections
        '500':
          $ref: '#/components/responses/ServerError'
  '/vectors/{vectorId}/collections/{collectionId}/queryables':
    get:
      tags:
        - Capabilities
      summary: Get the list of supported queryables for a collection
      description: |-
        This operation returns the list of supported queryables of a collection. Queryables are
        the properties that may be used to construct a filter expression on items in the collection.
        The response is a JSON Schema of a object where each property is a queryable.
      operationId: getQueryables
      parameters:
        - $ref: '#/components/parameters/vectorId'
        - $ref: '#/components/parameters/collectionId'
      responses:
        '200':
          description: The queryable properties of the collection.
          content:
            application/schema+json:
              schema:
                type: object
        '500':
          $ref: '#/components/responses/ServerError'
  '/vectors/{vectorId}/functions':
    get:
      tags:
        - Capabilities
      summary: Get the list of supported functions
      description: |-
        This operation returns the list of custom functions supported in CQL2 expressions.
      operationId: getFunctions
      parameters:
        - $ref: '#/components/parameters/vectorId'
      responses:
        '200':
          description: The list of custom functions supported in CQL2 expressions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/functions'
  '/vectors/{vectorId}/collections/{collectionId}/items':
    get:
      tags:
        - Features
      summary: fetch features
      description: |-
        Fetch features of the feature collection with id `collectionId`.
        Every feature in a dataset belongs to a collection. A dataset may
        consist of multiple feature collections. A feature collection is often a
        collection of features of a similar type, based on a common schema.
        Use content negotiation to request HTML or GeoJSON.
      operationId: getFeatures
      parameters:
        - $ref: '#/components/parameters/vectorId'
        - $ref: '#/components/parameters/collectionId'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/bbox'
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/filter-lang'
        - $ref: '#/components/parameters/filter-crs'
        - $ref: '#/components/parameters/datetime'
        - $ref: '#/components/parameters/subtrajectory'
      responses:
        '200':
          $ref: '#/components/responses/Features'
        '400':
          $ref: '#/components/responses/InvalidParameter'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  '/vectors/{vectorId}/collections/{collectionId}/binary':
    get:
      tags:
        - Features
      summary: fetch binary features in bson
      operationId: getBinary
      parameters:
        - $ref: '#/components/parameters/vectorId'
        - $ref: '#/components/parameters/collectionId'
        - $ref: '#/components/parameters/ids'
      responses:
        '200':
          $ref: '#/components/responses/FeaturesBinary'
        '400':
          $ref: '#/components/responses/InvalidParameter'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  '/vectors/{vectorId}/collections/{collectionId}/map':
    get:
      tags:
        - Maps
      summary: Retrieve a map for the specified collection
      operationId: getMap
      parameters:
        - $ref: '#/components/parameters/vectorId'
        - $ref: '#/components/parameters/collectionId'
        - $ref: '#/components/parameters/mapLayer'
      responses:
        '200':
          $ref: '#/components/responses/Map'
        '204':
          $ref: '#/components/responses/EmptyMap'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  '/vectors/{vectorId}/collections/{collectionId}/items/{featureId}':
    get:
      tags:
        - Features
      summary: fetch a single feature
      description: |-
        Fetch the feature with id `featureId` in the feature collection
        with id `collectionId`.
        Use content negotiation to request HTML or GeoJSON.
      operationId: getFeature
      parameters:
        - $ref: '#/components/parameters/vectorId'
        - $ref: '#/components/parameters/collectionId'
        - $ref: '#/components/parameters/featureId'
      responses:
        '200':
          $ref: '#/components/responses/Feature'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  '/vectors/{vectorId}/routes':
    get:
      summary: |-
        fetch the list of routes
      description: |-
        The list of all routes currently available on this server.
        The response contains a link to each route with the link
        relation type `item`.
        If a route has a name, the name will be used in the `title`,
        otherwise the `title` will be set by the server.
        A link to the canonical URI of this document is included,
        too, with the link relation type `self`.
      operationId: getRoutes
      parameters:
        - $ref: '#/components/parameters/vectorId'
      tags:
        - Option Routes
      responses:
        '200':
          description: |-
            The list of routes.
          content:
            application/json:
                schema:
                  $ref: '#/components/schemas/routes'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      summary: |-
        compute a route
      description: |-
        This creates a new route. The payload of the request specifies the
        definition of the new route.
        At a minimum, a route is defined by two `waypoints`, the start and end
        point of the route.
        Every API has to support at least 'fastest' and 'shortest' as the
        routing `preference`. The default value is 'fastest'.
        An optional `name` for the route may be provided. The name will be
        used as the title in links to the route (e.g., in the response to
        `/routes`) and also included in the route itself.
        More parameters and routing constraints can optionally be provided
        with the routing request:
        * Source dataset to use when processing the route
        * Routing engine to use when processing the route
        * Routing algorithm to use when processing the route
        * Obstacle requirements
        * Height restriction
        * Maximum load restriction
        * Time of departure or arrival
        If the parameter `mode` is not provided or has a value 'async' the
        response returns a link the new route in the `Location` header. If
        the value is 'sync' no route resource is created on the server, but
        the connection is kept open until the route has been computed. The
        response contains the route. In synchronous mode the `subscriber`
        property is ignored.
      operationId: computeRoute
      tags:
        - Option Routes
      parameters:
        - $ref: '#/components/parameters/vectorId'
        - $ref: '#/components/parameters/mode'
      requestBody:
        description: |-
          The definition of the route to compute.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/routeDefinition'
      responses:
        '200':
          description: |-
            This response is only returned for synchronous processing (`mode=sync`).
            The response is the route.
            If the request included an `Accept-Language`, the server will try to
            honor the request and otherwise fall back to an available language.
          content:
            application/geo+json:
              schema:
                $ref: '#/components/schemas/route'
          headers:
            Content-Language:
              schema:
                type: string
              description: |-
                The language used for names, in particular road/street names.
        '201':
          description: |-
            This response is only returned for asynchronous processing (`mode=async`
            or no `mode` parameter).
            The route has been created and the route is being computed.
          headers:
            Location:
              schema:
                type: string
                format: uri
              description: |-
                URI of the new resource.
        '400':
          description: |-
            Malformed route definition.
        '422':
          description: |-
            Unprocessable request. The route definition document appears
            to be valid, but the server is incapable of processing
            the request.
        '500':
          $ref: '#/components/responses/ServerError'
      callbacks:
        calculationCompleted:
          '{$request.body#/subscriber}':
            post:
              requestBody:
                description: the route
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/route'
              responses:
                '202':
                  description: |-
                    Route received successfully
  '/vectors/{vectorId}/routes/{routeId}':
    get:
      summary: fetch a route
      description: |-
        The route is represented as a GeoJSON feature collection.
        Its contents will depend on the `status` of the processing.
        If the status is 'successful' the feature collection consists
        of the following informaton
        * A `name`, if one was provided with the route definition.
        * A link to the canonical URI of the route and its definition
        (link relations `self` and `describedBy`)
        * An array of features (the properties of each is to be decided)
          * The route overview feature. This has a LineString
          geometry of the complete route from start to end location.
          * The start point of the route with a Point geometry.
          * A feature for every segment of the route. This has a
            Point geometry representing the last point of the segment.
          * The end point of the route with a Point geometry.
        If the status is 'accepted', 'running' or 'failed' the
        feature collection has less information:
        * The route overview has a `null` geometry.
        * No segment features are included.
        The parameter `resultSet` may be used to request only a subset
        of the route.
        * 'full' (default) returns the complete feature collection
        representing the route.
        * 'overview' returns just the route overview feature.
        * 'segments' returns the first segment feature with a
        link to the second segment (link relation `next`), if there
        is more than one segment. It is up to the server how this is
        implemented. Options include another parameter to identify the
        segment by index or temporary, opaque URIs. Every segment except
        the first and the last segment will include two links (link
        relations `prev` and `next`). The last segment will only have a
        `prev` link (unless there is only a single segment in which case
        there is no `prev` link).
        Support for the `resultSet` parameter is not required and the
        parameter may be removed from the API definition, if conformance
        class **'result-set'** is not listed in the conformance
        declaration (`/conformance`).
      operationId: getRoute
      tags:
        - Option Routes
      parameters:
        - $ref: '#/components/parameters/vectorId'
        - $ref: '#/components/parameters/routeId'
        - $ref: '#/components/parameters/resultSet'
      responses:
        '200':
          description: |-
            The route or just the route overview or a segment of the route,
            if parameter `resultSet` was used.
            If the request included an `Accept-Language`, the server will try to
            honor the request and otherwise fall back to an available language.
          content:
            application/geo+json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/route'
                  - $ref: '#/components/schemas/route-overview'
                  - $ref: '#/components/schemas/route-segment'
          headers:
            Content-Language:
              schema:
                type: string
              description: |-
                The language used for names, in particular road/street names.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      summary: delete a route
      description: |-
        Delete the route with identifier `routeId`. If the route is still in processing,
        the routing process is canceled.
        Routing APIs are permitted to delete routes after some time automatically.
        Supporting the operation is optional and part of conformance class
        **'delete-route'**.
      operationId: deleteRoute
      tags:
        - Option Routes
      parameters:
        - $ref: '#/components/parameters/vectorId'
        - $ref: '#/components/parameters/routeId'
      responses:
        '204':
          description: |-
            Route deleted.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  '/vectors/{vectorId}/routes/{routeId}/definition':
    get:
      summary: fetch the definition of a route
      description: |-
        This operation returns the original definition of the route that
        was submitted when the route was created using POST on `/routes`.
      operationId: getRouteDefinition
      tags:
        - Option Routes
      parameters:
        - $ref: '#/components/parameters/vectorId'
        - $ref: '#/components/parameters/routeId'
      responses:
        '200':
          description: The route definition.
          content:
            application/json:
                schema:
                  $ref: '#/components/schemas/routeDefinition'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  '/vectors/{vectorId}/tsp':
    post:
      summary: compute traveling salesman problem
      operationId: computeTSP
      tags:
        - TSP
      parameters:
        - $ref: '#/components/parameters/vectorId'
      requestBody:
        content:
          application/json:
            schema:
              required:
                - cell_ids
              properties:
                cell_ids:
                  type: array
                  items:
                    type: string
                  example: ["1", "2", "3", "7", "8", "9"]
                start:
                  type: string
                  example: "2"
                end:
                  type: string
                  example: "7"
      responses:
        '200':
          description: The TSP result
          content:
            application/json:
              schema:
                required:
                  - cell_id_sequence
                  - cost
                properties:
                  cell_id_sequence:
                    type: array
                    items:
                      type: string
                    example: ["2", "3", "1", "8", "9", "7"]
                  start:
                    type: string
                    example: "2"
                  end:
                    type: string
                    example: "7"
                  cost:
                    type: number
                    example: 123.45
                  lower_bound:
                    type: number
                    example: 122.22
                  gap:
                    type: number
                    example: 0.01
        '400':
          $ref: '#/components/responses/InvalidParameter'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
components:
  parameters:
    bbox:
      name: bbox
      in: query
      description: |-
        Only features that have a geometry that intersects the bounding box are selected.
        The bounding box is provided as four or six numbers, depending on whether the
        coordinate reference system includes a vertical axis (height or depth):
        * Lower left corner, coordinate axis 1
        * Lower left corner, coordinate axis 2
        * Minimum value, coordinate axis 3 (optional)
        * Upper right corner, coordinate axis 1
        * Upper right corner, coordinate axis 2
        * Maximum value, coordinate axis 3 (optional)
        If the value consists of four numbers, the coordinate reference system is
        WGS 84 longitude/latitude (http://www.opengis.net/def/crs/OGC/1.3/CRS84)
        unless a different coordinate reference system is specified in the parameter `bbox-crs`.
        If the value consists of six numbers, the coordinate reference system is WGS 84
        longitude/latitude/ellipsoidal height (http://www.opengis.net/def/crs/OGC/0/CRS84h)
        unless a different coordinate reference system is specified in the parameter `bbox-crs`.
        The query parameter `bbox-crs` is specified in OGC API - Features - Part 2: Coordinate
        Reference Systems by Reference.
        For WGS 84 longitude/latitude the values are in most cases the sequence of
        minimum longitude, minimum latitude, maximum longitude and maximum latitude.
        However, in cases where the box spans the antimeridian the first value
        (west-most box edge) is larger than the third value (east-most box edge).
        If the vertical axis is included, the third and the sixth number are
        the bottom and the top of the 3-dimensional bounding box.
        If a feature has multiple spatial geometry properties, it is the decision of the
        server whether only a single spatial geometry property is used to determine
        the extent or all relevant geometries.
      required: false
      schema:
        type: array
        oneOf:
        - minItems: 4
          maxItems: 4
        - minItems: 6
          maxItems: 6
        items:
          type: number
      style: form
      explode: false
    filter:
      name: filter
      in: query
      required: false
      description: CQL2 boolean expresion
      example: tag = 'building' AND S_CONTAINS(geom, POINT(0 0))
      schema:
        type: string
      style: form
      explode: false
    filter-lang:
      name: filter-lang
      in: query
      required: false
      schema:
        type: string
        enum:
          - 'cql2-text'
          - 'cql2-json'
        default: 'cql2-text'
      style: form
    filter-crs:
      name: filter-crs
      in: query
      required: false
      schema:
        type: string
        format: uri-reference
        default: 4326
      style: form
      explode: false
    collectionId:
      name: collectionId
      in: path
      description: |-
        we support 4 collectionId: "cell", "connection", "binary" and sketch_id
      required: true
      schema:
        type: string
        oneOf:
          - enum:
            - cell
            - connection
            - binary
          - pattern: '[0-9a-fA-F]{7,40}'
    datetime:
      name: datetime
      in: query
      description: |-
        Either a date-time or an interval. Date and time expressions adhere to RFC 3339.
        Intervals may be bounded or half-bounded (double-dots at start or end).
        Examples:
        * A date-time: "2018-02-12T23:20:50Z"
        * A bounded interval: "2018-02-12T00:00:00Z/2018-03-18T12:31:12Z"
        * Half-bounded intervals: "2018-02-12T00:00:00Z/.." or "../2018-03-18T12:31:12Z"
        Only features that have a temporal property that intersects the value of
        `datetime` are selected.
        If a feature has multiple temporal properties, it is the decision of the
        server whether only a single temporal property is used to determine
        the extent or all relevant temporal properties.
      required: false
      schema:
        type: string
      style: form
      explode: false
    featureId:
      name: featureId
      in: path
      description: local identifier of a feature
      required: true
      schema:
        type: string
    limit:
      name: limit
      in: query
      description: |-
        The optional limit parameter limits the number of items that are presented in the response document.
        Only items are counted that are on the first level of the collection in the response document.
        Nested objects contained within the explicitly requested items shall not be counted.
        Minimum = 1. Maximum = 10000. Default = 10.
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 10000
        default: 10
      style: form
      explode: false
    vectorId:
      name: vectorId
      in: path
      description: id of vector
      required: true
      schema:
        type: string
    ids:
      name: ids
      description: id array of binary data in collection
      in: query
      required: true
      schema:
        type: array
        items:
          type: number
        minItems: 1
        maxItems: 500
      example: ids=1,2,3,10,11,12
      style: form
      explode: false
    mapLayer:
      name: mapLayer
      in: query
      description: layer of map
      required: false
      schema:
        type: string
        enum:
          - origin
          - mask
          - merged
        default: merged
    routeId:
      name: routeId
      in: path
      description: The id of the route
      required: true
      schema:
        type: string
    jobId:
      name: jobId
      in: path
      description: The id of a job
      required: true
      schema:
        type: string
    resultSet:
      name: resultSet
      in: query
      description: |-
        Request the complete route or only a subset.
        Support for this parameter is not required and the parameter may be
        removed from the API definition, if conformance class **'result-set'**
        is not listed in the conformance declaration under `/conformance`.
      schema:
        type: string
        enum:
          - full
          - overview
          - segments
        default: full
        example: segments
    mode:
      name: mode
      in: query
      description: |-
        Controls whether the request is processed asynchronuous (the default)
        or synchronous (the route isreturned in the response to the POST request
        and not stored on the routing server).
        Support for this parameter is not required and the parameter may be
        removed from the API definition, if conformance class **'sync-mode'**
        is not listed in the conformance declaration under `/conformance`.
      schema:
        type: string
        enum:
          - async
          - sync
        default: async
        example: sync
    subtrajectory:
      name: subtrajectory
      in: query
      required: false
      description: |-
        The `subtrajectory` parameter is a boolean value used with the `datetime` parameter.
        If the `subtrajectory` is "true",
        * the `datetime` must be a bounded interval, not half-bounded intervals or a date-time.
        * the `datetime` represents a specified time interval (new start time and new end time)
        * only features with a temporal geometry intersecting the given time interval will return.
        The `subtrajectory` query implements *subtrajectory* operation, which is defined in the [OGC Moving Feature Access](https://docs.ogc.org/is/16-120r3/16-120r3.html).
        This operation returns only a subsequence of temporal geometry within a time interval contained in the `datetime` parameter, using interpolated trajectory according to the `interpolation` property.
        If the `subtrajectory` parameter is provided with a `bbox` parameter, it will only apply to resources that intersect with a `bbox` parameter.
        The `subtrajectory` parameter must not be used with the `leaf` parameter.
        Only one of these parameters can be used in the HTTP GET operation.
      schema:
        type: boolean
      style: form
      explode: false
  schemas:
    vector:
      type: object
      required:
        - id
        - sketch_ids
      properties:
        id:
          type: string
        sketch_ids:
          type: array
          items:
            type: string
        layer_count:
          type: integer
        cell_count:
          type: integer
        connection_count:
          type: integer
    vectors:
      type: object
      required:
        - vectors
      properties:
        vectors:
          type: array
          items:
            $ref: "#/components/schemas/vector"
    collection:
      type: object
      required:
        - id
        - links
      properties:
        id:
          description: identifier of the collection used, for example, in URIs
          type: string
          example: address
        title:
          description: human readable title of the collection
          type: string
          example: address
        description:
          description: a description of the features in the collection
          type: string
          example: An address.
        links:
          type: array
          items:
            $ref: "#/components/schemas/link"
          example:
            - href: http://data.example.com/buildings
              rel: item
            - href: http://example.com/concepts/buildings.html
              rel: describedby
              type: text/html
        extent:
          $ref: "#/components/schemas/extent"
        itemType:
          description: indicator about the type of the items in the collection (the default value is 'feature').
          type: string
          default: feature
        crs:
          description: the list of coordinate reference systems supported by the service
          type: array
          items:
            type: string
          default:
            - http://www.opengis.net/def/crs/OGC/1.3/CRS84
          example:
            - http://www.opengis.net/def/crs/OGC/1.3/CRS84
            - http://www.opengis.net/def/crs/EPSG/0/4326
    collections:
      type: object
      required:
        - links
        - collections
      properties:
        links:
          type: array
          items:
            $ref: "#/components/schemas/link"
        collections:
          type: array
          items:
            $ref: "#/components/schemas/collection"
    confClasses:
      type: object
      required:
        - conformsTo
      properties:
        conformsTo:
          type: array
          items:
            type: string
    exception:
      type: object
      description: |-
        Information about the exception: an error code plus an optional description.
      required:
        - code
      properties:
        code:
          type: string
        description:
          type: string
    extent:
      type: object
      description: |-
        The extent of the features in the collection. In the Core only spatial and temporal
        extents are specified. Extensions may add additional members to represent other
        extents, for example, thermal or pressure ranges.
      properties:
        spatial:
          description: |-
            The spatial extent of the features in the collection.
          type: object
          properties:
            bbox:
              description: |-
                One or more bounding boxes that describe the spatial extent of the dataset.
                In the Core only a single bounding box is supported. Extensions may support
                additional areas. If multiple areas are provided, the union of the bounding
                boxes describes the spatial extent.
              type: array
              minItems: 1
              items:
                description: |-
                  Each bounding box is provided as four or six numbers, depending on
                  whether the coordinate reference system includes a vertical axis
                  (height or depth):
                  * Lower left corner, coordinate axis 1
                  * Lower left corner, coordinate axis 2
                  * Minimum value, coordinate axis 3 (optional)
                  * Upper right corner, coordinate axis 1
                  * Upper right corner, coordinate axis 2
                  * Maximum value, coordinate axis 3 (optional)
                  The coordinate reference system of the values is WGS 84 longitude/latitude
                  (http://www.opengis.net/def/crs/OGC/1.3/CRS84) unless a different coordinate
                  reference system is specified in `crs`.
                  For WGS 84 longitude/latitude the values are in most cases the sequence of
                  minimum longitude, minimum latitude, maximum longitude and maximum latitude.
                  However, in cases where the box spans the antimeridian the first value
                  (west-most box edge) is larger than the third value (east-most box edge).
                  If the vertical axis is included, the third and the sixth number are
                  the bottom and the top of the 3-dimensional bounding box.
                  If a feature has multiple spatial geometry properties, it is the decision of the
                  server whether only a single spatial geometry property is used to determine
                  the extent or all relevant geometries.
                type: array
                oneOf:
                - minItems: 4
                  maxItems: 4
                - minItems: 6
                  maxItems: 6
                items:
                  type: number
                example:
                  - -180
                  - -90
                  - 180
                  - 90
            crs:
              description: |-
                Coordinate reference system of the coordinates in the spatial extent
                (property `bbox`). The default reference system is WGS 84 longitude/latitude.
                In the Core this is the only supported coordinate reference system.
                Extensions may support additional coordinate reference systems and add
                additional enum values.
              type: string
              enum:
                - 'http://www.opengis.net/def/crs/OGC/1.3/CRS84'
              default: 'http://www.opengis.net/def/crs/OGC/1.3/CRS84'
        temporal:
          description: |-
            The temporal extent of the features in the collection.
          type: object
          properties:
            interval:
              description: |-
                One or more time intervals that describe the temporal extent of the dataset.
                The value `null` is supported and indicates an unbounded interval end.
                In the Core only a single time interval is supported. Extensions may support
                multiple intervals. If multiple intervals are provided, the union of the
                intervals describes the temporal extent.
              type: array
              minItems: 1
              items:
                description: |-
                  Begin and end times of the time interval. The timestamps are in the
                  temporal coordinate reference system specified in `trs`. By default
                  this is the Gregorian calendar.
                type: array
                minItems: 2
                maxItems: 2
                items:
                  type: string
                  format: date-time
                  nullable: true
                example:
                  - '2011-11-11T12:22:11Z'
                  - null
            trs:
              description: |-
                Coordinate reference system of the coordinates in the temporal extent
                (property `interval`). The default reference system is the Gregorian calendar.
                In the Core this is the only supported temporal coordinate reference system.
                Extensions may support additional temporal coordinate reference systems and add
                additional enum values.
              type: string
              enum:
                - 'http://www.opengis.net/def/uom/ISO-8601/0/Gregorian'
              default: 'http://www.opengis.net/def/uom/ISO-8601/0/Gregorian'
    featureCollectionGeoJSON:
      type: object
      required:
        - type
        - features
      properties:
        type:
          type: string
          enum:
            - FeatureCollection
        features:
          type: array
          items:
            $ref: "#/components/schemas/featureGeoJSON"
        links:
          type: array
          items:
            $ref: "#/components/schemas/link"
        timeStamp:
          $ref: "#/components/schemas/timeStamp"
        numberMatched:
          $ref: "#/components/schemas/numberMatched"
        numberReturned:
          $ref: "#/components/schemas/numberReturned"
    featureGeoJSON:
      type: object
      required:
        - type
        - geometry
        - properties
      properties:
        type:
          type: string
          enum:
            - Feature
        geometry:
          $ref: "#/components/schemas/geometryGeoJSON"
        properties:
          type: object
          nullable: true
        id:
          oneOf:
            - type: string
            - type: integer
        links:
          type: array
          items:
            $ref: "#/components/schemas/link"
    geometryGeoJSON:
      oneOf:
      - $ref: "#/components/schemas/pointGeoJSON"
      - $ref: "#/components/schemas/multipointGeoJSON"
      - $ref: "#/components/schemas/linestringGeoJSON"
      - $ref: "#/components/schemas/multilinestringGeoJSON"
      - $ref: "#/components/schemas/polygonGeoJSON"
      - $ref: "#/components/schemas/multipolygonGeoJSON"
      - $ref: "#/components/schemas/geometrycollectionGeoJSON"
    geometrycollectionGeoJSON:
      type: object
      required:
        - type
        - geometries
      properties:
        type:
          type: string
          enum:
            - GeometryCollection
        geometries:
          type: array
          items:
            $ref: "#/components/schemas/geometryGeoJSON"
    landingPage:
      type: object
      required:
        - links
      properties:
        title:
          type: string
          example: Buildings in Bonn
        description:
          type: string
          example: Access to data about buildings in the city of Bonn via a Web API that conforms to the OGC API Features specification.
        links:
          type: array
          items:
            $ref: "#/components/schemas/link"
    linestringGeoJSON:
      type: object
      required:
        - type
        - coordinates
      properties:
        type:
          type: string
          enum:
            - LineString
        coordinates:
          type: array
          minItems: 2
          items:
            type: array
            minItems: 2
            items:
              type: number
    link:
      type: object
      required:
        - href
      properties:
        href:
          type: string
          example: http://data.example.com/buildings/123
        rel:
          type: string
          example: alternate
        type:
          type: string
          example: application/geo+json
        hreflang:
          type: string
          example: en
        title:
          type: string
          example: Trierer Strasse 70, 53115 Bonn
        length:
          type: integer
    multilinestringGeoJSON:
      type: object
      required:
        - type
        - coordinates
      properties:
        type:
          type: string
          enum:
            - MultiLineString
        coordinates:
          type: array
          items:
            type: array
            minItems: 2
            items:
              type: array
              minItems: 2
              items:
